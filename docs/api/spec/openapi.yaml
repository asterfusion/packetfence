---
components:
  parameters:
    Async:
      description: Asyncronous request.
      name: async
      required: true
      schema:
        $ref: '#/components/schemas/Async'
    X-PacketFence-Server:
      description: Proxy CRUD to IPv4 address of a specific server in a cluster instead
        of LB.
      in: header
      name: X-PacketFence-Server
      required: true
      schema:
        pattern: \b((25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)(\.|$)){4}\b
        type: string
    cursor:
      description: The cursor pointer to fetch paginated results (from `prevCursor`
        and `nextCursor`).
      name: cursor
      schema:
        example: 0
        type: string
    fields:
      description: Comma delimited fields that should be added to the resource by
        performing joins. For example, in order to get the IP address of a node when
        calling the nodes endpoints, setting 'ip4log.ip' into this field will provide
        the latest IP address of the device in the 'ip4log.ip' field of every node
        that is returned.
      name: fields
      required: true
      schema:
        example:
        - mac
        - pid
        - ip4log.ip
        items:
          type: string
        type: array
    interface:
      description: The network interface.
      example: eth0
      in: path
      name: interface
      required: true
      schema:
        type: string
    ip:
      description: The IP address of the device.
      example: 1.2.3.4
      in: path
      name: ip
      required: true
      schema:
        type: string
    ipset_name:
      description: The name of the ipset to manipulate
      in: path
      name: ipset_name
      required: true
      schema:
        type: string
    limit:
      description: The maximum amount of entries to get.
      name: limit
      schema:
        enum:
        - 1
        - 5
        - 10
        - 25
        - 50
        - 100
        - 250
        - 500
        - 1000
        example: 1
        maximum: 1000
        minimum: 1
        type: integer
    local:
      description: The local is used to determine if the request should be forwarded
        to the rest of the cluster. A value of '0' forwards the request and either
        a missing or alternate value does not forward the request to the rest of the
        cluster.
      name: local
      required: true
      schema:
        default: 0
        type: integer
    locationlog_id:
      description: The locationlogs `PRIMARY_KEY`
      in: path
      name: locationlog_id
      required: true
      schema:
        type: string
    mac:
      description: The MAC address of the device.
      example: d3:4d:b4:c0:ff:ee
      in: path
      name: mac
      required: true
      schema:
        type: string
    network:
      example: 192.168.1.0
      in: path
      name: network
      required: true
      schema:
        type: string
    node_id:
      allowReserved: true
      description: The nodes `PRIMARY_KEY` (MAC Address)
      explode: false
      in: path
      name: node_id
      required: true
      schema:
        type: string
    search_query:
      description: The JSON encoded search query following the Search schema defined
        in this spec.
      in: path
      name: query
      required: true
      schema:
        $ref: '#/components/schemas/Search'
    service:
      description: Service unique identifier.
      in: path
      name: service
      required: true
      schema:
        enum:
        - api-frontend
        - fingerbank-collector
        - galera-autofix
        - haproxy-admin
        - haproxy-db
        - haproxy-portal
        - httpd.aaa
        - httpd.admin_dispatcher
        - httpd.dispatcher
        - httpd.portal
        - httpd.webservices
        - ip6tables
        - iptables
        - kafka
        - keepalived
        - mysql-probe
        - netdata
        - ntlm-auth-api
        - pfacct
        - pfconnector-client
        - pfconnector-server
        - pfcron
        - pfdetect
        - pfdhcp
        - pfdhcplistener
        - pfdns
        - pffilter
        - pfipset
        - pfldapexplorer
        - pfperl-api
        - pfpki
        - pfqueue-backend
        - pfqueue-go
        - pfqueue-perl
        - pfsetacls
        - pfsso
        - pfstats
        - proxysql
        - radiusd-auth
        - radiusd-load_balancer
        - radiusd-acct
        - radiusd-eduroam
        - radiusd-cli
        - radsniff
        - redis_ntlm_cache
        - redis_queue
        - snmptrapd
        - tracking-config
        type: string
    sort:
      description: The sort and order of the paginated entries.
      name: sort
      required: true
      schema:
        type: string
    user_id:
      description: The users `PRIMARY_KEY`
      in: path
      name: user_id
      required: true
      schema:
        type: string
  requestBodies:
    BulkImport:
